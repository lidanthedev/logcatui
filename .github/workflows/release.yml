name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.2.3"
        required: true
      version:
        description: "Package version, for example 1.2.3"
        required: false
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            VERSION="${{ inputs.version }}"
            DRAFT="${{ inputs.draft }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION=""
            DRAFT="false"
          fi

          if [[ -z "${VERSION}" ]]; then
          VERSION="${TAG#v}"
          if [[ "${VERSION}" != *.*.* ]]; then
            if [[ "${VERSION}" == *.* ]]; then
              VERSION="${VERSION}.0"
            else
              VERSION="${VERSION}.0.0"
            fi
          fi
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "draft=${DRAFT}" >> "${GITHUB_OUTPUT}"

  build-linux:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Build DEB and RPM
        run: |
          ./gradlew :composeApp:packageDeb :composeApp:packageRpm -PreleaseVersion=${{ needs.metadata.outputs.version }}

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: composeApp/build/compose/binaries/main/rpm/*.rpm
          if-no-files-found: error

  build-macos:
    needs: metadata
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build DMG
        run: |
          ./gradlew :composeApp:packageDmg -PreleaseVersion=${{ needs.metadata.outputs.version }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    needs: metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: powershell
        run: |
          .\gradlew.bat :composeApp:packageMsi -PreleaseVersion=${{ needs.metadata.outputs.version }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  release:
    needs:
      - metadata
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.tag }}
          draft: ${{ needs.metadata.outputs.draft == 'true' }}
          files: |
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.dmg
            release-assets/**/*.msi
